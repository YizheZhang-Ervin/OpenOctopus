<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1.0">
        <title>Canvas Video Player</title>
        <link rel="stylesheet" href="index.css">
    </head>

    <body class="whole">
        <canvas id="canvas" width="720"></canvas>
        <section class="right" id="right">
            <div class="cyber-chat">
                <!-- Chat title bar -->
                <div class="chat-header">
                    <h2>Agent · Atlas</h2>
                </div>

                <!-- Chat content area -->
                <div class="chat-messages" id="chatMessages">
                    <!-- Initial welcome message -->
                    <div class="message bot">
                        <p>Welcome to Atlas Space 🕹️ Please enter your message...</p>
                    </div>
                </div>

                <!-- Input area -->
                <div class="chat-input">
                    <textarea id="messageInput" placeholder="Enter message (press Enter to send)..."></textarea>
                    <button id="sendBtn">Send</button>
                </div>
            </div>
        </section>
        <script src="./index.js"></script>
    </body>

</html>
